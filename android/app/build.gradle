plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.example.customer_app"
    
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.customer_app"
        
        // Mengunci minSdk ke 23 untuk Firebase dan targetSdk ke 34
        minSdk = 23
        targetSdk = 34
        
        // Pengaman pembacaan versi aplikasi dari pubspec
        def polyfillVersionCode = flutter.versionCode
        versionCode = polyfillVersionCode != null ? polyfillVersionCode.toInteger() : 1
        
        def polyfillVersionName = flutter.versionName
        versionName = polyfillVersionName != null ? polyfillVersionName : "1.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}